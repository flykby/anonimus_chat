# Dev stack: postgres, redis, bot, api, ai (local build).
# Prod overrides: docker-compose.prod.yml
# Dev hot-reload: copy docker-compose.override.yml.example → docker-compose.override.yml

name: anonimus

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: anonimus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anonimus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anonimus}
      POSTGRES_DB: ${POSTGRES_DB:-anonimus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anonimus} -d ${POSTGRES_DB:-anonimus}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: anonimus-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: anonimus-api
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-anonimus}:${POSTGRES_PASSWORD:-anonimus}@postgres:5432/${POSTGRES_DB:-anonimus}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai:
    build:
      context: .
      dockerfile: docker/ai.Dockerfile
    container_name: anonimus-ai
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      RUNPOD_LLM_URL: ${RUNPOD_LLM_URL:-}
      RUNPOD_LLM_API_KEY: ${RUNPOD_LLM_API_KEY:-}
      RUNPOD_EMBEDDING_URL: ${RUNPOD_EMBEDDING_URL:-}
      RUNPOD_EMBEDDING_API_KEY: ${RUNPOD_EMBEDDING_API_KEY:-}
      RUNPOD_REQUEST_TIMEOUT_SEC: ${RUNPOD_REQUEST_TIMEOUT_SEC:-30}
    ports:
      - "${AI_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: anonimus-bot
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: ":8080"
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./certs:/app/certs:ro
    ports:
      - "${BOT_HTTP_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/bot-healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
