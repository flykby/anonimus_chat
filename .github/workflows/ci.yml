name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: "true"

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          install-only: true

      - name: Lint & test
        run: |
          make tidy
          make lint
          make test
          make build

  docker:
    name: Docker build & smoke
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: make build-docker

      - name: Smoke test bot image
        run: bash scripts/smoke-bot-image.sh

  push:
    name: Push to registry
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Push images
        if: ${{ secrets.REGISTRY_URL != '' }}
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_SHA: ${{ github.sha }}
          GIT_SHA_SHORT: ${{ github.sha }}
          GIT_BRANCH: main
        run: |
          REGISTRY_HOST="${REGISTRY_URL%%/*}"
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
          make push

      - name: Skip push (no registry secrets)
        if: ${{ secrets.REGISTRY_URL == '' }}
        run: echo "REGISTRY_URL secret not configured — push skipped"
