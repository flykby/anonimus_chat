name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  CI: "true"

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v1.64.8
          golangci-lint version

      - name: Lint & test
        run: |
          make tidy
          make lint
          make test
          make build

  docker:
    name: Docker build & smoke
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: make build-docker

      - name: Smoke test bot image
        run: bash scripts/smoke-bot-image.sh

  push:
    name: Push to registry
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}
      pushed: ${{ steps.meta.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4

      - name: Image metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if [[ -n "${{ secrets.REGISTRY_URL }}" ]]; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push images
        if: steps.meta.outputs.pushed == 'true'
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GIT_SHA: ${{ github.sha }}
          GIT_SHA_SHORT: ${{ steps.meta.outputs.short_sha }}
          GIT_BRANCH: main
        run: |
          login_user="${REGISTRY_USER:-}"
          login_password="${REGISTRY_PASSWORD:-}"
          if [[ "$REGISTRY_URL" == ghcr.io/* ]]; then
            login_user="${login_user:-${GITHUB_REPOSITORY_OWNER,,}}"
            login_password="${login_password:-$GITHUB_TOKEN}"
          fi
          REGISTRY_HOST="${REGISTRY_URL%%/*}"
          echo "$login_password" | docker login "$REGISTRY_HOST" -u "$login_user" --password-stdin
          make push

      - name: Skip push (no registry secrets)
        if: steps.meta.outputs.pushed != 'true'
        run: echo "REGISTRY_URL secret not configured — push skipped"

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check deploy configuration
        id: cfg
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [[ -z "$DEPLOY_HOST" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_HOST secret not configured — deploy skipped"
            exit 0
          fi
          if [[ -z "$DEPLOY_USER" ]]; then
            echo "::error::DEPLOY_USER secret is required when DEPLOY_HOST is set"
            exit 1
          fi
          if [[ -z "$DEPLOY_SSH_KEY" ]]; then
            echo "::error::DEPLOY_SSH_KEY secret is required when DEPLOY_HOST is set (private SSH key, full PEM contents)"
            exit 1
          fi
          KEY_FILE="$(mktemp)"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if ! ssh-keygen -y -f "$KEY_FILE" >/dev/null 2>&1; then
            rm -f "$KEY_FILE"
            echo "::error::DEPLOY_SSH_KEY is not a valid private key. Paste the full deploy_key file (not .pub), including BEGIN/END lines."
            exit 1
          fi
          rm -f "$KEY_FILE"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Require pushed images
        if: steps.cfg.outputs.enabled == 'true' && needs.push.outputs.pushed != 'true'
        run: |
          echo "Deploy is configured but REGISTRY_URL is missing — cannot deploy without pushed images"
          exit 1

      - name: Deploy via SSH
        if: steps.cfg.outputs.enabled == 'true' && needs.push.outputs.pushed == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ needs.push.outputs.image_tag }}
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/deploy_key"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i "$KEY_FILE" -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; cd /opt/anonimus_chat && bash scripts/remote-deploy.sh '${IMAGE_TAG}'"
          rm -f "$KEY_FILE"
