# Production overrides (use with docker-compose.yml).
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: anonimus-prod

services:
  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  api:
    image: ${REGISTRY_URL}/api:${IMAGE_TAG}
    build: !reset null
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"

  ai:
    image: ${REGISTRY_URL}/ai:${IMAGE_TAG}
    build: !reset null
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AI_PORT:-8001}:8001"

  bot:
    image: ${REGISTRY_URL}/bot:${IMAGE_TAG}
    build: !reset null
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BOT_HTTP_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: anonimus-caddy
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      bot:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
