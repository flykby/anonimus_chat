# Production stack on VM. Milestone 1: bot only.
# Usage: IMAGE_TAG=abc123 docker compose -f docker-compose.prod.yml up -d

name: anonimus-prod

services:
  bot:
    image: ${REGISTRY_URL}/bot:${IMAGE_TAG}
    container_name: anonimus-bot
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: ":8080"
    ports:
      - "127.0.0.1:${BOT_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: anonimus-caddy
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      bot:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
