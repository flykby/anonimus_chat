# Production overrides (use with docker-compose.yml).
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: anonimus-prod

services:
  postgres:
    restart: unless-stopped
    # No host port — api connects via docker network (postgres:5432).
    # Avoids conflicts with host PostgreSQL on 5432/5433.
    ports: !reset null

  redis:
    restart: unless-stopped
    ports: !reset null

  api:
    image: ${REGISTRY_URL}/api:${IMAGE_TAG}
    build: !reset null
    restart: unless-stopped
    # Internal only — bot reaches api via docker network.
    ports: !reset null

  ai:
    image: ${REGISTRY_URL}/ai:${IMAGE_TAG}
    build: !reset null
    restart: unless-stopped
    ports: !reset null

  bot:
    image: ${REGISTRY_URL}/bot:${IMAGE_TAG}
    build: !reset null
    restart: unless-stopped
    # Port 8443 for webhook (Telegram requires 443, 80, 88, or 8443)
    ports:
      - "8443:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: anonimus-caddy
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      bot:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
